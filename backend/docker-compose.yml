services:
  mysql:
    image: mysql:8.0
    container_name: spending_tracker_db
    environment:
      MYSQL_ROOT_PASSWORD: myrootpassword
      MYSQL_DATABASE: spending_tracker
      MYSQL_USER: n8n_user
      MYSQL_PASSWORD: n8n_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  n8n-workflows:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-workflows
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${EXTERNAL_DOMAIN:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=http://${EXTERNAL_DOMAIN:-localhost}/n8n/
      - N8N_URL=http://${EXTERNAL_DOMAIN:-localhost}/n8n/
      - GENERIC_TIMEZONE=Asia/Manila
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always
    depends_on:
      - mysql

  backend:
    image: phpmyadmin:latest
    container_name: backend
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: /db/
      MYSQL_ROOT_PASSWORD: myrootpassword
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - mysql

  dashboard:
    image: nginx:alpine
    container_name: admin_gateway
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  tunnel:
    image: node:18-alpine
    container_name: localtunnel
    command: npx localtunnel --port 80 --subdomain misocash-dev
    restart: always
    depends_on:
      - dashboard
      - n8n-workflows
      - backend

volumes:
  db_data:
  n8n_data:
