services:
  mysql:
    image: mysql:8.0
    container_name: spending_tracker_db
    environment:
      MYSQL_ROOT_PASSWORD: myrootpassword
      MYSQL_DATABASE: spending_tracker
      MYSQL_USER: n8n_user
      MYSQL_PASSWORD: n8n_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_server
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=192.168.254.159
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://192.168.254.159:5678/
      - GENERIC_TIMEZONE=Asia/Manila
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always
    depends_on:
      - mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: php_admin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: myrootpassword
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - mysql

  dashboard:
    image: nginx:alpine
    container_name: admin_links
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
    restart: always

volumes:
  db_data:
  n8n_data:
